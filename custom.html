<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 문제 &amp; 복습 - 의공기사 교재</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-bg:#1C2D4E;
  --sidebar-bg-deep:#141F38;
  --accent:#60A5FA;
  --accent-bg:rgba(96,165,250,.14);
  --content-bg:#F8F5EF;
  --card-bg:#FFFFFF;
  --card-border:rgba(15,23,42,.06);
  --card-shadow:0 1px 2px rgba(16,24,40,.04),0 4px 12px rgba(16,24,40,.05);
  --table-header:#1C2D4E;
  --section-line:#E0E8F4;
  --text-main:#1a1a2e;
  --text-muted:#6b7280;
  --star:#F59E0B;
  --star-bg:#FEF3C7;
  --danger:#EF4444;
  --danger-bg:#FEF2F2;
  --success:#10B981;
  --success-bg:#ECFDF5;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--content-bg);color:var(--text-main);min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* TOP BAR */
#topbar{background:linear-gradient(180deg,var(--sidebar-bg) 0%,var(--sidebar-bg-deep) 100%);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.15)}
#topbar-inner{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
#back-link{font-size:13px;color:#CBD5E1;font-weight:600;padding:6px 10px;border-radius:7px;transition:background .12s}
#back-link:hover{background:rgba(255,255,255,.08);color:#fff}
#topbar-inner h1{font-size:16px;font-weight:800;flex:1;min-width:120px}
#page-tabs{display:flex;gap:4px;flex-wrap:wrap}
.ptab{padding:9px 14px;font-size:13.5px;font-weight:700;color:#CBD5E1;background:none;border:none;border-radius:8px;cursor:pointer;transition:all .12s}
.ptab:hover{background:rgba(255,255,255,.08);color:#fff}
.ptab.active{background:var(--accent-bg);color:#fff;box-shadow:inset 0 0 0 1px rgba(96,165,250,.3)}
#auth-status{display:flex;align-items:center;gap:8px;order:3;font-size:12px;color:#CBD5E1}
.auth-wrap{max-width:420px;margin:60px auto}
.setup-wrap{max-width:600px;margin:40px auto}

/* LAYOUT */
#page-content{max-width:1080px;margin:0 auto;padding:24px 20px 60px}

/* CARDS / FORMS */
.card{background:var(--card-bg);border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:var(--card-shadow);border:1px solid var(--card-border)}
.card-title{font-size:14.5px;font-weight:700;color:var(--table-header);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--section-line)}
.card-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px;line-height:1.6}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-row label{font-size:13px;font-weight:700;color:var(--text-main)}
.form-row input[type=text],.form-row input[type=password],.form-row input[type=email],.form-row textarea,.form-row select{font-size:14.5px;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-family:inherit;color:var(--text-main);background:#fff;width:100%;box-sizing:border-box}
.form-row input[type=text],.form-row input[type=password],.form-row input[type=email]{height:40px}
.form-row input[type=text]:focus,.form-row input[type=password]:focus,.form-row input[type=email]:focus,.form-row textarea:focus,.form-row select:focus{outline:none;border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:64px;line-height:1.5}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.choice-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.choice-input-row input[type=radio]{width:18px;height:18px;flex-shrink:0;accent-color:var(--accent)}
.choice-input-row input[type=text]{flex:1}
.check-row{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600}
.check-row input{width:16px;height:16px;accent-color:var(--star)}

.btn{padding:10px 18px;border-radius:8px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:all .12s}
.btn-primary{background:#2563EB;color:#fff}
.btn-primary:hover{background:#1D4ED8}
.btn-secondary{background:#E5E7EB;color:#374151}
.btn-secondary:hover{background:#D1D5DB}
.btn-danger{background:var(--danger-bg);color:#991B1B}
.btn-danger:hover{background:#FEE2E2}
.btn-ghost{background:none;color:var(--text-muted);border:1.5px solid #E5E7EB}
.btn-ghost:hover{background:#F3F4F6}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:7px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

/* TYPE TOGGLE (add tab) */
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-toggle button{flex:1;padding:12px;border-radius:10px;border:1.5px solid #E5E7EB;background:#fff;font-weight:700;font-size:14px;color:var(--text-muted);cursor:pointer;transition:all .12s}
.type-toggle button.active{border-color:var(--accent);background:var(--accent-bg);color:#1C2D4E}

/* LIST */
.list-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.list-toolbar select,.list-toolbar input{font-size:13.5px;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:8px;font-family:inherit}
.list-toolbar input{flex:1;min-width:140px}
.item-row{display:flex;align-items:flex-start;gap:12px;padding:14px 4px;border-bottom:1px solid var(--section-line)}
.item-row:last-child{border-bottom:none}
.item-type-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.item-body{flex:1;min-width:0}
.item-text{font-size:14.5px;font-weight:600;line-height:1.5;margin-bottom:4px;overflow-wrap:anywhere}
.item-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text-muted)}
.tag-chip{background:#EEF2F9;color:#1C2D4E;padding:2px 8px;border-radius:10px;font-weight:600;font-size:12px}
.stat-chip{padding:2px 8px;border-radius:10px;font-weight:600;font-size:12px}
.stat-wrong{background:var(--danger-bg);color:#991B1B}
.stat-new{background:#EEF2F9;color:#374151}
.item-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#D1D5DB;transition:all .12s;line-height:1}
.star-btn.on{color:var(--star)}
.icon-btn{background:none;border:none;font-size:15px;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px}
.icon-btn:hover{background:#F3F4F6;color:var(--text-main)}
.empty-hint{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14.5px}

/* REVIEW SESSION */
.review-setup{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.review-setup select{font-size:13.5px;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:8px}
.review-progress{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:14px}
#session-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.fc-card-outer{width:100%;max-width:560px;perspective:1000px}
.fc-card{width:100%;min-height:200px;position:relative;transform-style:preserve-3d;transition:transform .4s;cursor:pointer}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fc-front{background:var(--card-bg);border:2px solid var(--section-line)}
.fc-back{background:var(--table-header);color:#fff;transform:rotateY(180deg)}
.fc-label{font-size:11px;font-weight:700;letter-spacing:.1em;opacity:.5;margin-bottom:12px}
.fc-text{font-size:17px;font-weight:600;line-height:1.6}
.fc-hint{font-size:12px;color:var(--text-muted);margin-top:8px}
.grade-row{display:flex;gap:12px}
.grade-btn{padding:12px 26px;border-radius:9px;border:none;font-weight:700;font-size:14.5px;cursor:pointer;transition:all .12s}
.grade-btn.bad{background:var(--danger-bg);color:#991B1B}
.grade-btn.bad:hover{background:#FEE2E2}
.grade-btn.good{background:var(--success-bg);color:#065F46}
.grade-btn.good:hover{background:#D1FAE5}
#quiz-session-wrap{max-width:640px;width:100%}
.q-text{font-size:15.5px;font-weight:600;margin-bottom:14px;line-height:1.6}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{text-align:left;padding:12px 14px;border-radius:8px;border:1.5px solid #E5E7EB;background:var(--card-bg);font-size:14.5px;cursor:pointer;transition:all .12s;line-height:1.5}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#F0F7FF}
.choice-btn.correct{border-color:#10B981;background:var(--success-bg);color:#065F46;font-weight:600}
.choice-btn.wrong{border-color:#EF4444;background:var(--danger-bg);color:#991B1B}
.choice-btn.reveal-correct{border-color:#10B981;background:var(--success-bg)}
.explanation{margin-top:12px;padding:12px 14px;background:#F0F9FF;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:13.5px;color:#0C4A6E;line-height:1.6}
.session-next{margin-top:6px}
.session-summary{text-align:center;padding:32px 20px}
.session-summary .big{font-size:30px;font-weight:800;color:var(--table-header);margin-bottom:8px}
.session-summary p{color:var(--text-muted);font-size:14.5px;margin-bottom:18px}

.sample-box{background:#0F172A;color:#E2E8F0;padding:14px 16px;border-radius:8px;font-family:'Consolas',monospace;font-size:12.5px;line-height:1.6;overflow-x:auto;white-space:pre;margin-bottom:10px}
.import-textarea{width:100%;min-height:140px;font-family:'Consolas',monospace;font-size:12.5px;padding:12px;border:1.5px solid #E5E7EB;border-radius:8px}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-top:10px}
.msg.ok{background:var(--success-bg);color:#065F46}
.msg.err{background:var(--danger-bg);color:#991B1B}

@media(max-width:768px){
  #topbar-inner{padding:12px 14px}
  #topbar-inner h1{font-size:14.5px;order:1;width:100%}
  #back-link{order:0}
  #page-tabs{order:2;width:100%}
  .ptab{flex:1;padding:10px 6px;font-size:12.5px;text-align:center}
  .form-grid2{grid-template-columns:1fr}
  .item-row{flex-wrap:wrap}
  .fc-card{min-height:180px}
}
</style>
</head>
<body>

<header id="topbar">
  <div id="topbar-inner">
    <a id="back-link" href="viewer.html">← 교재로 돌아가기</a>
    <h1>내 문제 &amp; 복습</h1>
    <nav id="page-tabs">
      <button class="ptab" data-tab="review" onclick="switchPageTab('review')">🎯 오늘의 복습</button>
      <button class="ptab" data-tab="list" onclick="switchPageTab('list')">📋 내 목록</button>
      <button class="ptab" data-tab="add" onclick="switchPageTab('add')">➕ 등록</button>
    </nav>
    <div id="auth-status"></div>
  </div>
</header>

<main id="page-content"></main>

<script>
// ─── STATE / STORAGE ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'mge_custom_items';
let items = loadItems();
let legacyItemsAtBoot = items.slice(); // snapshot taken before any cloud sync can overwrite this localStorage key
let currentPageTab = 'review';
let addType = 'flashcard'; // 'flashcard' | 'quiz'
let editingId = null;

function loadItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch (e) { return []; }
}
function saveItems() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function genId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

// ─── FIREBASE (계정 로그인 + 클라우드 동기화) ─────────────────────────────────
const FIREBASE_CONFIG_KEY = 'mge_firebase_config';
const MIGRATION_FLAG_KEY = 'mge_migrated_v1';
let db = null, auth = null, currentUser = null, unsubscribeItems = null;
let authMode = 'login'; // 'login' | 'signup'

function bootFirebase() {
  const raw = localStorage.getItem(FIREBASE_CONFIG_KEY);
  if (!raw) { renderSetupScreen(); return; }
  let cfg;
  try { cfg = JSON.parse(raw); } catch (e) { renderSetupScreen('저장된 설정을 읽을 수 없습니다. 다시 설정해주세요.'); return; }
  try {
    firebase.initializeApp(cfg);
  } catch (e) {
    renderSetupScreen('Firebase 초기화 실패: ' + e.message);
    return;
  }
  auth = firebase.auth();
  db = firebase.firestore();
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      startAppForUser();
    } else {
      currentUser = null;
      if (unsubscribeItems) { unsubscribeItems(); unsubscribeItems = null; }
      document.getElementById('auth-status').innerHTML = '';
      renderAuthScreen();
    }
  });
}

function renderSetupScreen(errorMsg) {
  document.getElementById('auth-status').innerHTML = '';
  document.getElementById('page-content').innerHTML = `
    <div class="card setup-wrap">
      <div class="card-title">🔥 Firebase 연결 설정 (최초 1회)</div>
      <div class="card-sub">Firebase 콘솔에서 만든 프로젝트의 설정 값(firebaseConfig)을 붙여넣으면 이 계정으로 로그인한 모든 기기에서 데이터가 동기화됩니다.</div>
      ${errorMsg ? `<div class="msg err">${escapeHtml(errorMsg)}</div>` : ''}
      <textarea id="fb-config-input" class="import-textarea" placeholder='{ apiKey: "...", authDomain: "...", projectId: "...", ... }'></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveFirebaseConfig()">저장하고 계속하기</button>
      </div>
    </div>
  `;
}

function saveFirebaseConfig() {
  const raw = document.getElementById('fb-config-input').value.trim();
  if (!raw) return;
  let cfg;
  try {
    cfg = (0, eval)('(' + raw + ')');
  } catch (e) {
    renderSetupScreen('설정 값을 해석할 수 없습니다. Firebase 콘솔에서 복사한 { ... } 객체 전체를 그대로 붙여넣어 주세요.');
    return;
  }
  if (!cfg || !cfg.apiKey || !cfg.projectId) {
    renderSetupScreen('apiKey, projectId 등 필수 값이 없습니다.');
    return;
  }
  localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(cfg));
  location.reload();
}

function resetFirebaseConfig() {
  if (auth) { try { auth.signOut(); } catch (e) {} }
  localStorage.removeItem(FIREBASE_CONFIG_KEY);
  location.reload();
}

function renderAuthScreen(errorMsg) {
  document.getElementById('page-content').innerHTML = `
    <div class="card auth-wrap">
      <div class="card-title">${authMode === 'login' ? '로그인' : '회원가입'}</div>
      ${errorMsg ? `<div class="msg err">${escapeHtml(errorMsg)}</div>` : ''}
      <div class="form-row"><label>이메일</label><input type="text" id="auth-email-input"></div>
      <div class="form-row"><label>비밀번호 (6자 이상)</label><input type="password" id="auth-pw-input"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitAuth()">${authMode === 'login' ? '로그인' : '가입하기'}</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="toggleAuthMode()">${authMode === 'login' ? '계정이 없다면 회원가입' : '이미 계정이 있다면 로그인'}</button>
        <button class="btn btn-ghost btn-sm" onclick="resetFirebaseConfig()">Firebase 설정 다시 하기</button>
      </div>
    </div>
  `;
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  renderAuthScreen();
}

function submitAuth() {
  const email = document.getElementById('auth-email-input').value.trim();
  const pw = document.getElementById('auth-pw-input').value;
  if (!email || pw.length < 6) { renderAuthScreen('이메일과 6자 이상 비밀번호를 입력해주세요.'); return; }
  const action = authMode === 'login'
    ? auth.signInWithEmailAndPassword(email, pw)
    : auth.createUserWithEmailAndPassword(email, pw);
  action.catch(e => renderAuthScreen(firebaseErrorText(e)));
}

function firebaseErrorText(e) {
  const map = {
    'auth/user-not-found': '가입되지 않은 이메일입니다.',
    'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
    'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
    'auth/email-already-in-use': '이미 가입된 이메일입니다.',
    'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
    'auth/weak-password': '비밀번호가 너무 약합니다 (6자 이상).'
  };
  return map[e.code] || (e.message || '오류가 발생했습니다.');
}

function logout() {
  if (auth) auth.signOut();
}

function startAppForUser() {
  document.getElementById('auth-status').innerHTML =
    `<span>${escapeHtml(currentUser.email || '')}</span><button class="btn btn-ghost btn-sm" onclick="logout()">로그아웃</button>`;
  document.querySelectorAll('.ptab').forEach(b => b.classList.toggle('active', b.dataset.tab === currentPageTab));
  subscribeItems();
  offerLegacyMigrationIfNeeded();
}

function itemsCollection() {
  return db.collection('users').doc(currentUser.uid).collection('items');
}

function subscribeItems() {
  if (unsubscribeItems) unsubscribeItems();
  unsubscribeItems = itemsCollection().onSnapshot(snap => {
    items = snap.docs.map(d => d.data());
    saveItems();
    if (!reviewActive) {
      if (currentPageTab === 'list') renderListTab();
      else if (currentPageTab === 'add') { /* leave form untouched */ }
      else renderReviewTab();
    }
  }, err => { console.error('firestore sync error', err); });
}

function persistUpsert(item) {
  if (!db || !currentUser || !item) return;
  itemsCollection().doc(item.id).set(item).catch(e => console.error('save failed', e));
}

function persistRemove(id) {
  if (!db || !currentUser) return;
  itemsCollection().doc(id).delete().catch(e => console.error('delete failed', e));
}

function offerLegacyMigrationIfNeeded() {
  if (localStorage.getItem(MIGRATION_FLAG_KEY)) return;
  const legacy = legacyItemsAtBoot || [];
  localStorage.setItem(MIGRATION_FLAG_KEY, '1');
  if (!legacy.length) return;
  if (confirm(`이 브라우저에 저장되어 있던 ${legacy.length}개 항목을 클라우드 계정으로 가져올까요?`)) {
    legacy.forEach(it => persistUpsert(normalizeItem(it)));
  }
}

function normalizeItem(raw) {
  const base = {
    id: raw.id || genId(),
    type: raw.type === 'quiz' ? 'quiz' : 'flashcard',
    tag: (raw.tag || '').trim(),
    starred: !!raw.starred,
    createdAt: raw.createdAt || Date.now(),
    timesShown: raw.timesShown || 0,
    wrongCount: raw.wrongCount || 0,
    lastSeenAt: raw.lastSeenAt || null
  };
  if (base.type === 'quiz') {
    base.text = raw.text || raw.q || '';
    base.choices = Array.isArray(raw.choices) && raw.choices.length === 4 ? raw.choices : ['', '', '', ''];
    base.answer = [1, 2, 3, 4].includes(Number(raw.answer)) ? Number(raw.answer) : 1;
    base.explanation = raw.explanation || '';
  } else {
    base.q = raw.q || raw.text || '';
    base.a = raw.a || raw.answer_text || '';
  }
  return base;
}

// ─── PRIORITY SCORING ────────────────────────────────────────────────────────
function staleDays(item) {
  if (!item.lastSeenAt) return 999;
  return (Date.now() - item.lastSeenAt) / 86400000;
}
function priorityScore(item) {
  const shown = item.timesShown || 0;
  const wrongRate = shown > 0 ? (item.wrongCount || 0) / shown : 0.6;
  const stale = Math.min(staleDays(item), 30);
  const staleScore = stale / 30;
  const starBonus = item.starred ? 0.25 : 0;
  return wrongRate * 0.5 + staleScore * 0.35 + starBonus;
}
function reasonTags(item) {
  const reasons = [];
  const shown = item.timesShown || 0;
  const wrongRate = shown > 0 ? (item.wrongCount || 0) / shown : 0;
  if (shown > 0 && wrongRate >= 0.34) reasons.push('자주 틀림');
  if (item.starred) reasons.push('중요 표시');
  if (staleDays(item) >= 7) reasons.push(item.timesShown ? '학습한지 오래됨' : '아직 안 봄');
  if (!reasons.length) reasons.push('복습 추천');
  return reasons;
}

// ─── TOP TABS ────────────────────────────────────────────────────────────────
function switchPageTab(tab) {
  if (!currentUser) return;
  currentPageTab = tab;

}

function handleBulkImport() {

  if (!raw) { showMsg('import-msg', '붙여넣은 내용이 없습니다.', false); return; }

  if (!Array.isArray(parsed)) { showMsg('import-msg', '최상위는 배열([...]) 이어야 합니다.', false); return; }
  let added = 0;
  parsed.forEach(raw2 => {

    const norm = normalizeItem(Object.assign({}, raw2, { id: null }));
    if (norm.type === 'flashcard' && (!norm.q || !norm.a)) return;

    showMsg('import-msg', `${added}개 항목을 추가했습니다.`, true);

  }
}

// ─── TABLE (CSV/TSV) IMPORT ──────────────────────────────────────────────────
function parseDelimited(text, delim) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === delim) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  row.push(field); rows.push(row);
  return rows.filter(r => !(r.length === 1 && r[0].trim() === ''));
}

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0];
  return firstLine.includes('\t') ? '\t' : ',';
}

function parseTypeCell(s) {
  s = (s || '').trim().toLowerCase();
  if (['quiz', '문제', '퀴즈', '객관식', '예상문제'].includes(s)) return 'quiz';
  return 'flashcard';
}

function parseStarCell(s) {
  s = (s || '').trim().toLowerCase();
  return ['y', 'yes', '1', 'true', 'o', '즐겨찾기', '중요'].includes(s);
}

function csvEscape(s) {
  s = String(s == null ? '' : s);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadTemplateCsv() {
  const header = ['유형', '질문', '답(플래시카드)', '보기1', '보기2', '보기3', '보기4', '정답(1-4)', '해설', '태그', '중요(Y/N)'];
  const sample = [
    ['flashcard', '심전도에서 P파가 의미하는 것은?', '심방의 탈분극', '', '', '', '', '', '', '기초의학', ''],
    ['quiz', '다음 중 심전도 P파가 나타내는 것은?', '', '심방 탈분극', '심실 탈분극', '심실 재분극', '방실 전도 지연', '1', 'P파는 심방의 탈분극을 의미한다.', '기초의학', 'Y']
  ];
  const csv = [header, ...sample].map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'flashcard_template.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleTableImport() {
  const raw = document.getElementById('table-import-text').value;
  if (!raw.trim()) { showMsg('table-msg', '붙여넣은 내용이 없습니다.', false); return; }
  const delim = detectDelimiter(raw);
  const rows = parseDelimited(raw.trim(), delim);
  let start = 0;
  if (rows.length && /^(유형|type)$/i.test((rows[0][0] || '').trim())) start = 1;
  let added = 0, skipped = 0;
  for (let i = start; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r.some(c => c && c.trim())) continue;
    const cells = r.map(c => (c || '').trim());
    const [typeCell, question, answerText, c1, c2, c3, c4, correct, explanation, tag, starredCell] = cells;
    const type = parseTypeCell(typeCell);
    let raw2;
    if (type === 'quiz') {
      const choices = [c1, c2, c3, c4];
      const ans = parseInt(correct);
      if (!question || choices.some(c => !c) || !(ans >= 1 && ans <= 4)) { skipped++; continue; }
      raw2 = { type: 'quiz', text: question, choices, answer: ans, explanation, tag, starred: parseStarCell(starredCell) };
    } else {
      if (!question || !answerText) { skipped++; continue; }
      raw2 = { type: 'flashcard', q: question, a: answerText, tag, starred: parseStarCell(starredCell) };
    }
    const norm = normalizeItem(raw2);
    items.push(norm);
    persistUpsert(norm);
    added++;
  }
  saveItems();
  if (added > 0) {
    showMsg('table-msg', `${added}개 추가되었습니다.${skipped ? ` (${skipped}개는 형식이 맞지 않아 건너뜀)` : ''}`, true);
    document.getElementById('table-import-text').value = '';
  } else {
    showMsg('table-msg', '유효한 행을 찾지 못했습니다. 열 순서를 확인해주세요.', false);
  }
}

let listFilterType = 'all';
let listFilterTag = 'all';
let listSearch = '';

function renderListTab() {
  const el = document.getElementById('page-content');
  const tags = Array.from(new Set(items.map(it => it.tag).filter(Boolean))).sort();
  el.innerHTML = `

          <option value="flashcard">플래시카드</option>
          <option value="quiz">예상문제</option>
        </select>
        <select id="filter-tag" onchange="listFilterTag=this.value;renderListBody()">
          <option value="all">전체 태그</option>
          ${tags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('')}
        </select>
        <input type="text" id="filter-search" placeholder="검색어..." oninput="listSearch=this.value;renderListBody()">

      </div>
      <div id="list-body"></div>
    </div>
  `;
  renderListBody();
}

function getFilteredItems() {
  return items.filter(it => {
    if (listFilterType !== 'all' && it.type !== listFilterType) return false;
    if (listFilterTag !== 'all' && it.tag !== listFilterTag) return false;
    if (listSearch) {
      const hay = (it.type === 'quiz' ? it.text : it.q + ' ' + it.a).toLowerCase();
      if (!hay.includes(listSearch.toLowerCase())) return false;
    }
    return true;
  });
}

function renderListBody() {
  const body = document.getElementById('list-body');
  if (!body) return;
  const filtered = getFilteredItems();
  if (!filtered.length) {
    body.innerHTML = `<div class="empty-hint">등록된 항목이 없습니다. "➕ 등록" 탭에서 추가해보세요.</div>`;
    return;
  }
  body.innerHTML = filtered.slice().sort((a, b) => b.createdAt - a.createdAt).map(it => {
    const preview = it.type === 'quiz' ? it.text : it.q;
    const wrongRate = it.timesShown > 0 ? Math.round((it.wrongCount / it.timesShown) * 100) : null;
    return `<div class="item-row">
      <div class="item-type-icon">${it.type === 'quiz' ? '📝' : '🗂'}</div>
      <div class="item-body">
        <div class="item-text">${escapeHtml(preview)}</div>
        <div class="item-meta">
          ${it.tag ? `<span class="tag-chip">${escapeHtml(it.tag)}</span>` : ''}
          ${wrongRate !== null ? `<span class="stat-chip ${wrongRate >= 34 ? 'stat-wrong' : 'stat-new'}">오답률 ${wrongRate}% (${it.timesShown}회)</span>` : `<span class="stat-chip stat-new">아직 안 봄</span>`}
          ${it.lastSeenAt ? `<span>마지막 학습 ${Math.floor(staleDays(it))}일 전</span>` : ''}
        </div>
      </div>
      <div class="item-actions">
        <button class="star-btn ${it.starred ? 'on' : ''}" title="중요 표시" onclick="toggleStar('${it.id}')">★</button>
        <button class="icon-btn" title="수정" onclick="editItem('${it.id}')">✏️</button>
        <button class="icon-btn" title="삭제" onclick="deleteItem('${it.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function toggleStar(id) {
  const it = items.find(x => x.id === id);
  if (it) { it.starred = !it.starred; saveItems(); persistUpsert(it); renderListBody(); }
}

function deleteItem(id) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  items = items.filter(x => x.id !== id);
  saveItems();
  persistRemove(id);
  renderListBody();
}

function editItem(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  editingId = id;
  addType = it.type;
  switchPageTab('add');
  renderAddForm(it);
  document.getElementById(addType === 'flashcard' ? 'type-fc-btn' : 'type-qz-btn').classList.add('active');
}

function exportItems() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'my_flashcards_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

        <label style="font-size:13.5px;font-weight:600">복습 개수:</label>
        <select id="review-count-select" onchange="reviewCount=parseInt(this.value)">
          ${[5, 10, 15, 20, 30, maxN].filter((v, i, a) => v <= maxN && a.indexOf(v) === i).sort((a, b) => a - b).map(n => `<option value="${n}" ${n === reviewCount ? 'selected' : ''}>${n}개</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="startReview()">복습 시작</button>
      </div>
    </div>
  `;
}

function startReview() {
  const sel = document.getElementById('review-count-select');
  if (sel) reviewCount = parseInt(sel.value);
  reviewQueue = items.slice().sort((a, b) => priorityScore(b) - priorityScore(a)).slice(0, reviewCount);
  reviewIdx = 0;
  reviewCorrect = 0;
  reviewWrong = 0;
  reviewFlipped = false;
  reviewActive = true;
  renderReviewSession();
}

function renderReviewSession() {
  const el = document.getElementById('page-content');
  if (reviewIdx >= reviewQueue.length) {
    el.innerHTML = `<div class="card"><div class="session-summary">
      <div class="big">${reviewCorrect} / ${reviewQueue.length}</div>
      <p>오늘의 복습을 마쳤습니다. 틀리거나 오래된 항목은 다음 세션에서 다시 등장합니다.</p>
      <button class="btn btn-primary" onclick="renderReviewTab()">복습 탭으로 돌아가기</button>
    </div></div>`;
    return;
  }
  const item = reviewQueue[reviewIdx];
  const reasons = reasonTags(item).map(r => `<span class="stat-chip stat-new">${escapeHtml(r)}</span>`).join(' ');
  el.innerHTML = `
    <div class="card">
      <div class="review-progress">${reviewIdx + 1} / ${reviewQueue.length}　${reasons}</div>
      <div id="session-wrap"></div>
    </div>
  `;
  if (item.type === 'flashcard') renderFlashcardSession(item);
  else renderQuizSession(item);
}

function renderFlashcardSession(item) {
  reviewFlipped = false;
  const wrap = document.getElementById('session-wrap');
  wrap.innerHTML = `
    <div class="fc-card-outer">
      <div class="fc-card" id="session-fc-card" onclick="flipSessionCard()">
        <div class="fc-front">
          <div class="fc-label">Q</div>
          <div class="fc-text">${escapeHtml(item.q)}</div>
          <div class="fc-hint">클릭하여 뒤집기</div>
        </div>
        <div class="fc-back">
          <div class="fc-label">A</div>
          <div class="fc-text">${escapeHtml(item.a)}</div>
        </div>
      </div>
    </div>
    <div id="session-grade-area"></div>
  `;
}

function flipSessionCard() {
  reviewFlipped = !reviewFlipped;
  const card = document.getElementById('session-fc-card');
  if (card) card.classList.toggle('flipped', reviewFlipped);
  const gradeArea = document.getElementById('session-grade-area');
  if (reviewFlipped && gradeArea) {
    gradeArea.innerHTML = `<div class="grade-row">
      <button class="grade-btn bad" onclick="gradeCurrent(false)">👎 헷갈려요</button>
      <button class="grade-btn good" onclick="gradeCurrent(true)">👍 알아요</button>
    </div>`;
  } else if (gradeArea) {
    gradeArea.innerHTML = '';
  }
}

function gradeCurrent(correct) {
  const item = reviewQueue[reviewIdx];
  recordResult(item, correct);
  if (correct) reviewCorrect++; else reviewWrong++;
  reviewIdx++;
  renderReviewSession();
}

function recordResult(sourceItem, correct) {
  const it = items.find(x => x.id === sourceItem.id);
  if (!it) return;
  it.timesShown = (it.timesShown || 0) + 1;
  if (!correct) it.wrongCount = (it.wrongCount || 0) + 1;
  it.lastSeenAt = Date.now();
  saveItems();
  persistUpsert(it);
}

function renderQuizSession(item) {
  const wrap = document.getElementById('session-wrap');
  wrap.innerHTML = `
    <div id="quiz-session-wrap">
      <div class="q-text">${escapeHtml(item.text)}</div>
      <div class="choices" id="session-choices">
        ${item.choices.map((c, ci) => `<button class="choice-btn" data-ci="${ci + 1}" onclick="pickSessionChoice(${ci + 1})">${ci + 1}. ${escapeHtml(c)}</button>`).join('')}
      </div>
      <div class="explanation" id="session-exp" style="display:none">${escapeHtml(item.explanation || '')}</div>
      <div class="btn-row session-next" id="session-next-area" style="display:none">
        <button class="btn btn-primary" onclick="nextReviewItem()">다음</button>
      </div>
    </div>
  `;
}

function pickSessionChoice(ci) {
  const item = reviewQueue[reviewIdx];
  const btns = document.querySelectorAll('#session-choices .choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const btnCi = parseInt(btn.dataset.ci);
    if (btnCi === item.answer) btn.classList.add('reveal-correct');
    if (btnCi === ci && ci !== item.answer) btn.classList.add('wrong');
    if (btnCi === ci && ci === item.answer) { btn.classList.remove('reveal-correct'); btn.classList.add('correct'); }
  });
  const exp = document.getElementById('session-exp');
  if (exp && item.explanation) exp.style.display = 'block';
  document.getElementById('session-next-area').style.display = 'flex';
  const correct = ci === item.answer;
  recordResult(item, correct);
  if (correct) reviewCorrect++; else reviewWrong++;
}

function nextReviewItem() {
  reviewIdx++;
  renderReviewSession();
}

// ─── UTIL ────────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.querySelector('.ptab[data-tab="review"]').classList.add('active');
bootFirebase();
</script>
</body>
</html>
